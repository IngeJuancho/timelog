name: timelog
description: "App para medir, controlar y analizar tiempos."
publish_to: 'none'

version: 3.11.0+30

environment:
  sdk: '>=3.8.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  csv: ^6.0.0
  file_saver: ^0.2.14 
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  flutter_riverpod: ^2.6.1
  file_picker: ^8.0.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.2
  excel: ^4.0.6
  share_plus: ^12.0.2
  http: ^1.6.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^4.0.0
  flutter_launcher_icons: "^0.13.1"
  build_runner: ^2.4.8
  isar_generator: ^3.1.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#00000000" # Fondo transparente
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true